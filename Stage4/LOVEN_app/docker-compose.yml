version: '3.8'

services:
  db:
    image: postgres:15
    container_name: loven_db
    restart: always
    environment:
      POSTGRES_USER: lamyaa_admin
      POSTGRES_PASSWORD: Lamyaa@3123
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: loven_backend
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: loven_main_db
      DB_USER: lamyaa_admin
      DB_PASSWORD: Lamyaa@3123
      DB_PORT: 5432
